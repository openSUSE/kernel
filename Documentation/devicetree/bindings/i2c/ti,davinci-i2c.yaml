%YAML 1.2
---
$id: http://devicetree.org/schemas/i2c/ti,davinci-i2c.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Texas Instruments DaVinci/Keystone I2C

maintainers:
  - Chaitanya Sabnis <chaitanya.msabnis@gmail.com>

allOf:
  - $ref: /schemas/i2c/i2c-controller.yaml#
  - if:
      properties:
        compatible:
          contains:
            const: ti,keystone-i2c
    then:
      required:
        - power-domains

properties:
  compatible:
    enum:
      - ti,davinci-i2c
      - ti,keystone-i2c

  reg:
    maxItems: 1

  interrupts:
    maxItems: 1

  clocks:
    maxItems: 1

  power-domains:
    maxItems: 1

  ti,has-pfunc:
    description:
      Indicates that the SoC supports PFUNC registers, allowing I2C pins 
      to function as GPIOs for manual toggling.
    type: boolean

required:
  - compatible
  - reg
  - interrupts
  - clocks

unevaluatedProperties: false

examples:
  - |
    i2c@1c22000 {
        compatible = "ti,davinci-i2c";
        reg = <0x01c22000 0x1000>;
        clocks = <&i2c_clk>;
        clock-frequency = <100000>;
        interrupts = <15>;
        #address-cells = <1>;
        #size-cells = <0>;

        sensor@48 {
            compatible = "national,lm75";
            reg = <0x48>;
        };
    };
