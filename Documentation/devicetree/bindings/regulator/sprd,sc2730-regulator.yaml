%YAML 1.2
---
$id: http://devicetree.org/schemas/regulator/sprd,sc2730-regulator.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Unisoc SC2730 Power Management IC regulators

maintainers:
  - Otto Pflüger <otto.pflueger@abscue.de>

patternProperties:
  "^dcdc-(core|cpu|gen[0-1]|gpu|mem|memq|modem|sram)$":
    type: object
    $ref: regulator.yaml#
    unevaluatedProperties: false

  "^ldo-avdd(12|18)$":
    type: object
    $ref: regulator.yaml#
    unevaluatedProperties: false

  "^ldo-vdd(18-dcxo|28)$":
    type: object
    $ref: regulator.yaml#
    unevaluatedProperties: false

  "^ldo-vdd(emmccore|kpled|ldo[0-2]|sd(core|io)|sim[0-2]|usb33|wcn|wifipa)$":
    type: object
    $ref: regulator.yaml#
    unevaluatedProperties: false

  "^ldo-vddcam(a0|a1|d0|d1|io|mot)$":
    type: object
    $ref: regulator.yaml#
    unevaluatedProperties: false

  "^ldo-vddrf(1v25|18)$":
    type: object
    $ref: regulator.yaml#
    unevaluatedProperties: false

additionalProperties: false
...
