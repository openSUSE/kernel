%YAML 1.2
---
$id: http://devicetree.org/schemas/rtc/epson,rx6110.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Epson RX6110 Real Time Clock

description:
  The Epson RX6110 can be used with SPI or I2C busses. The kind of bus depends
  on the SPISEL pin and cannot be configured via software.

maintainers:
  - Alexandre Belloni <alexandre.belloni@bootlin.com>

allOf:
  - $ref: rtc.yaml#
  - $ref: /schemas/spi/spi-peripheral-props.yaml#

properties:
  compatible:
    const: epson,rx6110

  reg:
    maxItems: 1

  spi-cs-high: true
  spi-cpha: true
  spi-cpol: true

required:
  - compatible
  - reg

dependencies:
  spi-cs-high: [ spi-cpha, spi-cpol ]
  spi-cpha: [ spi-cs-high, spi-cpol ]
  spi-cpol: [ spi-cs-high, spi-cpha ]

unevaluatedProperties: false

examples:
  # I2C mode
  - |
    i2c {
      #address-cells = <1>;
      #size-cells = <0>;

      rtc@32 {
        compatible = "epson,rx6110";
        reg = <0x32>;
      };
    };

  # SPI mode
  - |
    spi {
      #address-cells = <1>;
      #size-cells = <0>;

      rtc@3 {
        compatible = "epson,rx6110";
        reg = <3>;
        spi-cs-high;
        spi-cpha;
        spi-cpol;
      };
    };
