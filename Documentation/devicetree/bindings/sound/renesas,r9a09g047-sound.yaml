          dma-names = "tx", "rx", "tx", "rx", "tx", "rx", "tx", "rx", "tx", "rx";
        };
        ssiu-6 {
          dmas = <&dmac0 0x1d6d>, <&dmac0 0x1d6e>,
                 <&dmac1 0x1d6d>, <&dmac1 0x1d6e>,
                 <&dmac2 0x1d6d>, <&dmac2 0x1d6e>,
                 <&dmac3 0x1d6d>, <&dmac3 0x1d6e>,
                 <&dmac4 0x1d6d>, <&dmac4 0x1d6e>;
          dma-names = "tx", "rx", "tx", "rx", "tx", "rx", "tx", "rx", "tx", "rx";
        };
        ssiu-7 {
          dmas = <&dmac0 0x1d6f>, <&dmac0 0x1d70>,
