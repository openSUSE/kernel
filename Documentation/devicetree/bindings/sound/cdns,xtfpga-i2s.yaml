%YAML 1.2
---
$id: http://devicetree.org/schemas/sound/cdns,xtfpga-i2s.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: I2S controller built into xtfpga Xtensa bitstreams

maintainers:
  - Max Filippov <jcmvbkbc@gmail.com>

allOf:
  - $ref: dai-common.yaml#

properties:
  compatible:
    const: cdns,xtfpga-i2s

  reg:
    maxItems: 1

  interrupts:
    maxItems: 1

  clocks:
    maxItems: 1
    description: phandle to the clk used as master clock. I2S bus clock is derived from it.

  "#sound-dai-cells":
    const: 0

required:
  - compatible
  - reg
  - interrupts
  - clocks

unevaluatedProperties: false

examples:
  - |
    i2s@d080000 {
        compatible = "cdns,xtfpga-i2s";
        reg = <0x0d080000 0x40>;
        interrupts = <2 1>;
        clocks = <&cdce706 4>;
        #sound-dai-cells = <0>;
    };
