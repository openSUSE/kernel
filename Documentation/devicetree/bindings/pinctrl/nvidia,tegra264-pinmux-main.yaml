                    drive_pwr_i2c_scl_pw6, drive_soc_gpio250_pf0,
                    drive_soc_gpio251_pf1, drive_soc_gpio252_pf2,
                    drive_dp_aux_ch0_hpd_pf3, drive_dp_aux_ch1_hpd_pf4,
                    drive_dp_aux_ch2_hpd_pf5, drive_dp_aux_ch3_hpd_pf6,
