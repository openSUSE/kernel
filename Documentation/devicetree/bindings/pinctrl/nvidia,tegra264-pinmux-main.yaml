                    drive_soc_gpio274_py4, drive_soc_gpio275_py5,
                    drive_soc_gpio276_py6, drive_soc_gpio277_py7,
                    drive_soc_gpio278_pz0, drive_soc_gpio279_pz1,
                    drive_soc_gpio282_pz4, drive_soc_gpio283_pz5,
