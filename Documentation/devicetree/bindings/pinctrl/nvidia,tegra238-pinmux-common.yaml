            uartg_cts, uartg_rts, uartg_txd, uartg_rxd, sdmmc1_clk,
            sdmmc1_cmd, sdmmc1_comp, sdmmc1_dat3, sdmmc1_dat2,
            sdmmc1_dat1, sdmmc1_dat0, ufs0, soc_therm_oc1, hdmi_cec,
            gp_pwm4, uartc_rxd, uartc_txd, i2c8_dat, i2c8_clk,
